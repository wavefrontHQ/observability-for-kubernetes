apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-proxy
    name: test-proxy
  name: test-proxy
  namespace: observability-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-proxy
  template:
    metadata:
      labels:
        app: test-proxy
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
      containers:
        - name: test-proxy
          image: projects.registry.vmware.com/tanzu_observability_keights_saas/test-proxy:latest
          imagePullPolicy: Always
          command: [ "/test-proxy", "-proxy", ":2878", "-logLevel", "info" ]
          ports:
          - name: proxy
            containerPort: 2878
            protocol: TCP
          - name: control
            containerPort: 8888
            protocol: TCP
          securityContext:
            privileged: false
---
apiVersion: v1
kind: Service
metadata:
  name: test-proxy
  labels:
    app: test-proxy
  namespace: observability-system
spec:
  ports:
    - name: wavefront
      port: 2878
      protocol: TCP
  selector:
    app: test-proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wavefront-collector-config
  namespace: YOUR_NAMESPACE
data:
  config.yaml: |
    clusterName: YOUR_CLUSTER_NAME
    enableDiscovery: true
    enableEvents: false
    defaultCollectionInterval: 7s

    sinks:
    - proxyAddress: test-proxy:2878
      filters:
        tagExclude:
        - label?controller?revision*
        - label?pod?template*
        - annotation_kubectl_kubernetes_io_last_applied_configuration

    sources:
      kubernetes_source:
        url: https://kubernetes.default.svc
        kubeletPort: 10250
        kubeletHttps: true
        useServiceAccount: true
        insecure: true
        prefix: kubernetes.
        filters:
          metricDenyList:
          - 'kubernetes.sys_container.*'
          tagExclude:
          - 'label.kubernetes.io/arch'

      internal_stats_source:
        prefix: kubernetes.
        filters:
          tagExclude:
          - 'url'
    
      kubernetes_state_source:
        prefix: kubernetes.
        filters:
          tagExclude:
          - 'label.kubernetes.io/arch'
    
      kubernetes_control_plane_source:
        collection:
          interval: 20s

      kubernetes_cadvisor_source:
        prefix: 'kubernetes.cadvisor.'
        filters:
          metricAllowList:
          - "kubernetes.cadvisor.container.cpu.cfs.throttled.seconds.total.counter"
          - "kubernetes.cadvisor.container.cpu.cfs.throttled.periods.total.counter"
    
      telegraf_sources:
      # enable all telegraf plugins
      - plugins: [ ]
      - plugins:  [ mysql ]
        conf: |
            servers = ["root:password123@tcp(mysql-release.collector-targets.svc.cluster.local:3306)/?tls=false"]
            table_schema_databases                    = []
            gather_table_io_waits                     = true
            gather_table_lock_waits                   = true
            gather_index_io_waits                     = true
        filters:
          tagExclude:
          - server

    discovery:
      enable_runtime_plugins: true
      annotation_excludes:
      - labels:
          please-exclude-from-discovery: ['true']
      plugins:
      # auto-discover coredns
      - name: coredns-discovery
        type: prometheus
        selectors:
          images:
          - '*coredns:*'
          labels:
            k8s-app:
            - kube-dns
        port: 9153
        path: /metrics
        scheme: http
        prefix: kube.coredns.
        filters:
          metricAllowList:
          - 'kube.coredns.coredns.cache.*'
          - 'kube.coredns.coredns.dns.request.count.total.counter'
          - 'kube.coredns.coredns.dns.request.duration.seconds'
          - 'kube.coredns.coredns.dns.request.size.bytes'
          - 'kube.coredns.coredns.dns.request.type.count.total.counter'
          - 'kube.coredns.coredns.dns.response.rcode.count.total.counter'
          - 'kube.coredns.coredns.dns.response.size.bytes'
          - 'kube.coredns.process.*'
---
# Need to change YOUR_CLUSTER_NAME, YOUR_WAVEFRONT_URL accordingly
apiVersion: wavefront.com/v1alpha1
kind: Wavefront
metadata:
  name: wavefront
  namespace: YOUR_NAMESPACE
spec:
  clusterName: YOUR_CLUSTER_NAME
  wavefrontUrl: YOUR_WAVEFRONT_URL
  dataCollection:
    metrics:
      enable: true
      customConfig: wavefront-collector-config
  dataExport:
    wavefrontProxy:
      enable: true

